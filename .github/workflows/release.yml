name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/PhotoBooth.Web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/PhotoBooth.Web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run build

      - name: Lint frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run lint

      - name: Test frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run test

      - name: Test .NET
        run: dotnet test --verbosity normal --filter "TestCategory!=Integration"

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          TAG="${TAG#.}"
          MSI_VERSION=$(echo "$TAG" | grep -oP '^\d+\.\d+\.\d+')
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "msi_version=${MSI_VERSION}" >> $GITHUB_OUTPUT

      - name: Publish for Windows x64
        run: |
          dotnet publish src/PhotoBooth.Server/PhotoBooth.Server.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/win-x64

      - name: Create release archive
        run: |
          cd publish/win-x64
          zip -r ../../PhotoBooth-${{ steps.version.outputs.version }}-win-x64.zip .

      - name: Install WiX toolset
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext

      - name: Build MSI installer
        run: |
          wix build installer/PhotoBooth.wxs \
            -ext WixToolset.UI.wixext \
            -d ProductVersion=${{ steps.version.outputs.msi_version }} \
            -d PublishDir=publish/win-x64 \
            -o PhotoBooth-${{ steps.version.outputs.version }}-win-x64.msi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            PhotoBooth-${{ steps.version.outputs.version }}-win-x64.zip \
            PhotoBooth-${{ steps.version.outputs.version }}-win-x64.msi \
            --clobber
