name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.wixproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/PhotoBooth.Web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/PhotoBooth.Web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run build

      - name: Lint frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run lint

      - name: Test frontend
        working-directory: src/PhotoBooth.Web
        run: pnpm run test

      - name: Test .NET
        run: dotnet test --verbosity normal --filter "TestCategory!=Integration"

      - name: Extract version from tag
        id: version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $msiVersion = $version -replace '[-+].*$',''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "msi_version=$msiVersion" >> $env:GITHUB_OUTPUT

      - name: Publish for Windows x64
        run: >
          dotnet publish src/PhotoBooth.Server/PhotoBooth.Server.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Create release archive
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath PhotoBooth-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Restore WiX installer
        run: dotnet restore installer/PhotoBooth.Installer/PhotoBooth.Installer.wixproj

      - name: Build MSI installer
        run: >
          dotnet build installer/PhotoBooth.Installer/PhotoBooth.Installer.wixproj
          --configuration Release
          -p:InstallerVersion=${{ steps.version.outputs.msi_version }}
          "-p:PublishDir=${{ github.workspace }}\publish\win-x64\"

      - name: Stage MSI for upload
        run: Copy-Item (Get-ChildItem -Path installer\PhotoBooth.Installer\bin -Filter *.msi -Recurse | Select-Object -First 1).FullName PhotoBooth-${{ steps.version.outputs.version }}-win-x64.msi

      - name: Upload zip asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} PhotoBooth-${{ steps.version.outputs.version }}-win-x64.zip --clobber

      - name: Upload MSI asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} PhotoBooth-${{ steps.version.outputs.version }}-win-x64.msi --clobber
